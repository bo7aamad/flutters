name: Build Flutter Production APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java Development Kit 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Google Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'
        channel: 'stable'

    # STEP 1: Save your custom trading code in a temporary backup file
    - name: Backup Custom Quantitative Code
      run: cp lib/main.dart main.dart.bak

    # STEP 2: Clear out the old config to prevent project naming mismatches
    - name: Clear Old Config Baselines
      run: rm -f pubspec.yaml

    # STEP 3: Generate clean native folders matching your exact repository name
    - name: Generate Android Native Templates
      run: flutter create . --overwrite

    # STEP 4: Inject the network package safely using official Flutter tools
    - name: Inject Internet Package Dependency
      run: flutter pub add http

    # STEP 5: Overwrite the example counter app with your trading workstation code
    - name: Restore Custom Quantitative Code
      run: cp main.dart.bak lib/main.dart

    # STEP 6: Compile the production binary asset layout
    - name: Compile Native Android Machine Binary
      run: flutter build apk --debug

    - name: Upload Standalone Mobile Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Production-Flutter-Package
        path: build/app/outputs/flutter-apk/app-debug.apk

    - name: Install Architecture Dependencies
      run: flutter pub get

    - name: Compile Native Android Machine Binary
      run: flutter build apk --debug

    - name: Upload Standalone Mobile Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Production-Flutter-Package
        path: build/app/outputs/flutter-apk/app-debug.apk
