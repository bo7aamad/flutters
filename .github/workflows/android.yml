name: Build Flutter Production APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.19.x', channel: 'stable' }

      - name: Generate Native App Config
        run: |
          flutter pub get
          # 1. Create the Android folder
          flutter create .
          # 2. Set the App Name
          flutter pub run flutter_launcher_name:main
          # 3. Set the App Icon
          flutter pub run flutter_launcher_icons
          # 4. Patch SDK versions
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 35/g' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 35/g' android/app/build.gradle

      - name: Build APK
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: zeus-workstation
          path: build/app/outputs/flutter-apk/*.apk
