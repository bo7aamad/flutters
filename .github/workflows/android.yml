name: Build Flutter Production APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.19.x', channel: 'stable' }

      - name: Build and Modernize
        run: |
          flutter pub get
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 35/g' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 35/g' android/app/build.gradle
          flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: quant-workstation-apk
          path: build/app/outputs/flutter-apk/*.apk
