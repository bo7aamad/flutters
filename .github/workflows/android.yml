name: Build Flutter Production APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java Development Kit 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Google Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'
        channel: 'stable'

    - name: Backup Custom Quantitative Code
      run: cp lib/main.dart main.dart.bak

    # Fully flushes the repository workspace cache layers to avoid old version blocks
    - name: Clear Old Config Baselines
      run: rm -rf pubspec.yaml android ios web windows macos linux

    # Re-initializes a fresh project configuration blueprint
    - name: Generate Android Native Templates
      run: flutter create --org com.malsalamah --project-name quant_workstation .

    - name: Inject Internet Package Dependency
      run: flutter pub add http

    # Modernizes the internal template architectures to support modern target SDK environments
    - name: Modernize Android Target and Compile SDK Versions
      run: |
        python3 -c "
        import os
        path = 'android/app/build.gradle'
        if os.path.exists(path):
            with open(path, 'r') as f:
                content = f.read()
            content = content.replace('compileSdkVersion flutter.compileSdkVersion', 'compileSdkVersion 35')
            content = content.replace('targetSdkVersion flutter.targetSdkVersion', 'targetSdkVersion 35')
            with open(path, 'w') as f:
                f.write(content)
        "

    - name: Restore Custom Quantitative Code
      run: |
        mkdir -p lib
        cp main.dart.bak lib/main.dart

    - name: Clean Build Cache Environment
      run: flutter clean

    - name: Compile Native Android Machine Binary
      run: flutter build apk --debug

    - name: Upload Standalone Mobile Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Production-Flutter-Package-Build-${{ github.run_number }}-${{ github.run_attempt }}
        path: build/app/outputs/flutter-apk/app-debug.apk
