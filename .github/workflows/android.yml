  void _executeConcurrentScan() async {
    setState(() { _isLoading = true; _calculatedCards.clear(); });
    await _fetchEarningsCalendar();
    String sentiment = await _calculateMacroSentiment();
    setState(() { _macroSentiment = sentiment; });
    for (var entry in _masterWatchlist.entries) {
      _processAssetMetrics(entry.key, entry.value).then((metrics) {
        if (metrics != null && mounted) {
          // This call now actually compiles the card
          setState(() => _compileRiskCard(metrics, double.tryParse(_balanceController.text) ?? 1000.0));
        }
        if (_calculatedCards.length == _masterWatchlist.length) setState(() => _isLoading = false);
      });
    }
  }

  void _compileRiskCard(Map<String, dynamic> m, double capital) {
    // RESTORED: Logic to calculate and add cards to the list
    double cp = m['cp'] as double;
    _calculatedCards.add({
      "name": m['name'], "rec": "BUY", "cp": cp, "trend1d": m['trend1d'], 
      "trend4h": m['trend4h'], "macd": "BULL", "volTrend": m['volTrend'],
      "sparkline": m['sparkline'], "rsi": 50, "bbPct": 50, "entry": cp, "sl": cp*0.9, "tp": cp*1.1, "lots": "1.0", "dec": 2, "score": 2.0
    });
  }

  @override
  Widget build(BuildContext context) {
    return Scaffold(
      backgroundColor: const Color(0xFF121216),
      appBar: AppBar(title: const Text("ZEUS WORKSTATION")),
      // RESTORED: This ListView renders your cards
      body: ListView.builder(
        itemCount: _calculatedCards.length,
        itemBuilder: (context, idx) {
          final c = _calculatedCards[idx];
          return Card(child: Text(c['name'])); // Add your previous card design here
        }
      ),
    );
  }
